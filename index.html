<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TALKCRAB 匠蟹 · 管理平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#C8102E;--blue:#1B3A6B;--blue-mid:#2E5698;--blue-light:#E8EEF7;
  --green:#059669;--purple:#7C3AED;
  --bg:#F0F2F7;--border:#E2E5EC;--white:#fff;--muted:#6B7280;
}
body{font-family:'Segoe UI',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);overflow:hidden;height:100vh;}

/* ── TOPBAR ── */
.topbar{
  height:50px;background:var(--blue);display:flex;align-items:center;
  justify-content:space-between;padding:0 18px;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.logo-text{color:#fff;font-size:15px;font-weight:800;letter-spacing:1px;}
.logo-sub{color:rgba(232,238,247,.55);font-size:9.5px;letter-spacing:1.5px;margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.clock{color:rgba(232,238,247,.8);font-size:12px;font-variant-numeric:tabular-nums;letter-spacing:.3px;}
.outlet-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;letter-spacing:.5px;}

/* ── TABS ── */
.tabbar{
  height:44px;background:var(--white);border-bottom:2px solid var(--border);
  display:flex;position:fixed;top:50px;left:0;right:0;z-index:99;
  box-shadow:0 2px 6px rgba(0,0,0,.05);
}
.tab{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;
  border:none;background:none;font-family:inherit;
  border-bottom:3px solid transparent;transition:all .18s;
  white-space:nowrap;padding:0 8px;
}
.tab:hover{color:#1A1D24;background:var(--bg);}
.tab.active{color:var(--red);border-bottom-color:var(--red);background:var(--white);}
.tab-icon{font-size:17px;line-height:1;}
.tab-col{display:flex;flex-direction:column;align-items:flex-start;line-height:1.25;}
.tab-zh{font-size:12.5px;font-weight:700;}
.tab-en{font-size:9.5px;font-weight:400;color:var(--muted);letter-spacing:.3px;}
.tab.active .tab-en{color:rgba(200,16,46,.55);}

/* ── FRAME AREA ── */
.frame-area{position:fixed;top:94px;left:0;right:0;bottom:0;}
.frame-wrap{position:absolute;inset:0;display:none;}
.frame-wrap.active{display:block;}
iframe.app-frame{width:100%;height:100%;border:none;display:block;}

/* ── LOADING ── */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;background:var(--bg);
}
.spinner{
  width:38px;height:38px;border:3px solid var(--blue-light);
  border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--muted);}
.loading-url{font-size:11px;color:#9CA3AF;margin-top:-6px;}

/* ── FALLBACK ── */
.fallback{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;background:var(--bg);padding:24px;text-align:center;
}
.fallback-icon{font-size:44px;}
.fallback-title{font-size:16px;font-weight:700;color:#1A1D24;}
.fallback-msg{font-size:13px;color:var(--muted);max-width:340px;line-height:1.7;}
.open-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--blue);color:#fff;padding:12px 24px;border-radius:10px;
  font-size:13px;font-weight:700;text-decoration:none;transition:opacity .15s;
}
.open-btn:hover{opacity:.88;}

/* ── STATUS DOT ── */
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-ok{background:#10B981;}.dot-loading{background:#F59E0B;}.dot-err{background:#EF4444;}
.tab-status{display:flex;align-items:center;font-size:10px;color:var(--muted);margin-top:1px;}
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div>
    <div class="logo-text">TALKCRAB 匠蟹</div>
    <div class="logo-sub">MANAGEMENT HUB · KEPONG</div>
  </div>
  <div class="topbar-right">
    <div class="clock" id="clock">--:--</div>
    <div class="outlet-badge">KEPONG</div>
  </div>
</div>

<!-- ── TABS ── -->
<div class="tabbar">
  <button class="tab active" id="tab-sales" onclick="showTab('sales',this)">
    <span class="tab-icon">📊</span>
    <div class="tab-col">
      <span class="tab-zh">业绩</span>
      <span class="tab-en">Performance</span>
    </div>
  </button>
  <button class="tab" id="tab-ops" onclick="showTab('ops',this)">
    <span class="tab-icon">📋</span>
    <div class="tab-col">
      <span class="tab-zh">货物 &amp; 日检</span>
      <span class="tab-en">Ops Checklist</span>
    </div>
  </button>
  <button class="tab" id="tab-mgmt" onclick="showTab('mgmt',this)">
    <span class="tab-icon">👥</span>
    <div class="tab-col">
      <span class="tab-zh">管理</span>
      <span class="tab-en">Management</span>
    </div>
  </button>
</div>

<!-- ── FRAMES ── -->
<div class="frame-area">

  <!-- 业绩 -->
  <div class="frame-wrap active" id="wrap-sales">
    <div class="loading-wrap" id="loading-sales">
      <div class="spinner"></div>
      <div class="loading-txt">正在加载业绩数据…</div>
      <div class="loading-url">kepong-operation.vercel.app</div>
    </div>
    <iframe class="app-frame" id="frame-sales"
      src="https://kepong-operation.vercel.app/"
      onload="onFrameLoad('sales')"
      onerror="onFrameError('sales')">
    </iframe>
  </div>

  <!-- 货物 & 日检 -->
  <div class="frame-wrap" id="wrap-ops">
    <div class="loading-wrap" id="loading-ops">
      <div class="spinner"></div>
      <div class="loading-txt">正在加载运营清单…</div>
      <div class="loading-url">talkcrab-kepong.vercel.app</div>
    </div>
    <iframe class="app-frame" id="frame-ops"
      src="https://talkcrab-kepong.vercel.app/?k=tc-hub-9938"
      onload="onFrameLoad('ops')"
      onerror="onFrameError('ops')">
    </iframe>
  </div>

  <!-- 管理 -->
  <div class="frame-wrap" id="wrap-mgmt">
    <div class="loading-wrap" id="loading-mgmt">
      <div class="spinner"></div>
      <div class="loading-txt">正在加载员工管理系统…</div>
      <div class="loading-url">management-system-nu-peach.vercel.app</div>
    </div>
    <iframe class="app-frame" id="frame-mgmt"
      src="https://management-system-nu-peach.vercel.app/"
      onload="onFrameLoad('mgmt')"
      onerror="onFrameError('mgmt')">
    </iframe>
  </div>

</div>

<script>
const TABS = {
  sales:{ url:'https://kepong-operation.vercel.app/',           icon:'📊', name:'业绩'     },
  ops:  { url:'https://talkcrab-kepong.vercel.app/',            icon:'📋', name:'货物/日检' },
  mgmt: { url:'https://management-system-nu-peach.vercel.app/', icon:'👥', name:'管理'     },
};

// ── TAB SWITCHING ─────────────────────────────────────────────
function showTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.frame-wrap').forEach(w=>w.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('wrap-'+name).classList.add('active');
}

// ── FRAME LOAD DETECTION ──────────────────────────────────────
function onFrameLoad(name){
  const loading = document.getElementById('loading-'+name);
  const frame   = document.getElementById('frame-'+name);

  // For cross-origin frames we can't inspect content — assume loaded OK
  try {
    const doc = frame.contentDocument;
    // Same-origin: check if it has meaningful content
    if(doc && doc.body && doc.body.innerHTML.trim().length < 10){
      // Possibly blocked or blank
      onFrameError(name);
      return;
    }
  } catch(e){
    // Cross-origin (expected) — it loaded fine
  }
  loading.style.display = 'none';
  frame.style.opacity   = '1';
}

function onFrameError(name){
  const loading = document.getElementById('loading-'+name);
  const frame   = document.getElementById('frame-'+name);
  loading.style.display = 'none';
  frame.style.display   = 'none';

  const wrap = document.getElementById('wrap-'+name);
  const info = TABS[name];
  const div  = document.createElement('div');
  div.className = 'fallback';
  div.innerHTML = `
    <div class="fallback-icon">${info.icon}</div>
    <div class="fallback-title">无法在框架内加载 ${info.name}</div>
    <div class="fallback-msg">此页面可能不允许嵌入显示。<br>点击下方按钮在新窗口开启。</div>
    <a class="open-btn" href="${info.url}" target="_blank">↗ 在新窗口开启</a>
  `;
  wrap.appendChild(div);
}

// ── HIDE FRAMES UNTIL LOADED ──────────────────────────────────
document.querySelectorAll('.app-frame').forEach(f=>{
  f.style.opacity = '0';
  f.style.transition = 'opacity .3s';
});

// Timeout fallback — if frame hasn't loaded in 12s, show error
const timeouts = {};
['sales','ops','mgmt'].forEach(name=>{
  timeouts[name] = setTimeout(()=>{
    const loading = document.getElementById('loading-'+name);
    if(loading && loading.style.display !== 'none'){
      onFrameError(name);
    }
  }, 12000);
});

function onFrameLoad(name){
  clearTimeout(timeouts[name]);
  const loading = document.getElementById('loading-'+name);
  const frame   = document.getElementById('frame-'+name);
  try {
    const doc = frame.contentDocument;
    if(doc && doc.body && doc.body.innerHTML.trim().length < 10){
      onFrameError(name); return;
    }
  } catch(e){ /* cross-origin = fine */ }
  loading.style.display = 'none';
  frame.style.opacity   = '1';
}

// ── CLOCK ─────────────────────────────────────────────────────
function tick(){
  const n  = new Date();
  const dy = ['日','一','二','三','四','五','六'][n.getDay()];
  const dt = `${n.getMonth()+1}月${n.getDate()}日（周${dy}）`;
  const tm = n.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clock').textContent = `${dt}  ${tm}`;
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
